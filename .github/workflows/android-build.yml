name: Android Build (APK)

# Builds a release APK entirely on the free GitHub runner — no EAS, no Expo
# account. Managed Expo project, so we prebuild the native android/ project on
# the fly, then run Gradle directly. We build the *release* variant (not debug)
# because a debug APK does not embed the JS bundle — it expects a Metro dev
# server at runtime, so sideloading it shows a white screen forever. The release
# variant bundles the JS in, and Expo's generated release buildType signs it
# with the debug keystore (fine for personal sideloading).
#
# Download the APK from the run's "Artifacts" section and sideload it.

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a build manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native android project
        run: npx expo prebuild --platform android --no-install
        env:
          # Bundled into the JS at build time (public by design). Optional:
          # the app builds without it, only the AI features stay dormant.
          EXPO_PUBLIC_GEMINI_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_KEY }}

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          EXPO_PUBLIC_GEMINI_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pocket-library-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
